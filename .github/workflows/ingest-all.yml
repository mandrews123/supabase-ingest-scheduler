name: 'Ingest Sports (manual: today or future-range)'

on:
  workflow_dispatch:
    inputs:
      sport:
        description: 'Which sport to ingest'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - soccer
          - ufc
          - ncaa
          - boxing
          - nba
          - mlb
      mode:
        description: 'today = only today; future-range = today + next N-1 days'
        required: true
        default: 'future-range'
        type: choice
        options:
          - today
          - future-range
      days:
        description: 'Number of days when mode=future-range (1-30, includes today)'
        required: true
        default: '7'

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      PROJECT_URL: https://dpdbdiwfanenccdvuyao.supabase.co
      FUNCTION_NAME: hyper-function
      SUPABASE_JWT: ${{ secrets.SUPABASE_ANON_JWT }}
    steps:
      - name: Resolve inputs
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          SPORT_INPUT="${{ github.event.inputs.sport }}"
          MODE_INPUT="${{ github.event.inputs.mode }}"
          DAYS_INPUT="${{ github.event.inputs.days }}"

          # normalize
          SPORT_INPUT="$(echo "$SPORT_INPUT" | tr '[:upper:]' '[:lower:]')"
          MODE_INPUT="$(echo "$MODE_INPUT" | tr '[:upper:]' '[:lower:]')"

          # days validation
          if [[ "$MODE_INPUT" == "future-range" ]]; then
            if [[ "$DAYS_INPUT" =~ ^[0-9]+$ ]]; then
              DAYS_VAL="$DAYS_INPUT"
            else
              DAYS_VAL=7
            fi
            if (( DAYS_VAL < 1 )); then DAYS_VAL=1; fi
            if (( DAYS_VAL > 30 )); then DAYS_VAL=30; fi
          else
            DAYS_VAL=1
          fi

          # sports list
          if [[ "$SPORT_INPUT" == "all" ]]; then
            SPORTS="soccer ufc ncaa boxing nba mlb"
          else
            SPORTS="$SPORT_INPUT"
          fi

          echo "SPORTS=$SPORTS" >> "$GITHUB_OUTPUT"
          echo "DAYS=$DAYS_VAL" >> "$GITHUB_OUTPUT"

          echo "Resolved -> SPORTS='$SPORTS' DAYS=$DAYS_VAL"

      - name: Ingest with curl (DEBUG)
        shell: bash
        env:
          SPORTS: ${{ steps.cfg.outputs.SPORTS }}
          DAYS: ${{ steps.cfg.outputs.DAYS }}
        run: |
          set -euo pipefail

          base="${PROJECT_URL}/functions/v1/${FUNCTION_NAME}"

          # headers (always send content-type; add auth if secret exists)
          declare -a HEADERS
          HEADERS=( -H "Content-Type: application/json" )
          if [[ -n "${SUPABASE_JWT:-}" ]]; then
            HEADERS+=( -H "apikey: ${SUPABASE_JWT}" )
            HEADERS+=( -H "Authorization: Bearer ${SUPABASE_JWT}" )
          fi

          call_curl_debug () {
            local sport="$1"
            local days="$2"
            local url="${base}?only=${sport}"
            if [[ "$days" != "1" ]]; then
              url="${url}&days=${days}"
            fi
            echo "::group::POST ${url}"
            # No -f here, so we can see the error body even on 4xx/5xx
            curl -sS -D /tmp/headers.txt -o /tmp/body.txt \
              -w "HTTP_CODE=%{http_code}\n" \
              -X POST "$url" "${HEADERS[@]}" -d '{}' || true
            echo "--- Response headers ---"
            cat /tmp/headers.txt || true
            echo "--- Response body ---"
            cat /tmp/body.txt || true
            echo "::endgroup::"
          }

          for s in ${SPORTS}; do
            case "$s" in
              soccer|ufc|boxing|nba|mlb) call_curl_debug "$s" "$DAYS" ;;
              ncaa)                       call_curl_debug "$s" 1      ;; # today-only
              *) echo "Skipping unknown sport '$s'" >&2 ;;
            esac
          done

      - name: Where to verify
        run: |
          echo "✅ Done."
          echo "Check results in Supabase:"
          echo " • Edge Functions → ${FUNCTION_NAME} → Invocations (HTTP status & duration)"
          echo " • Edge Functions → ${FUNCTION_NAME} → Logs (look for [ingest] fetched_counts / upserted_total)"
          echo " • Database → Table Editor → sports.events OR run the SQL below:"
          cat <<'SQL'
          select provider, league, sport, event_status,
                 start_time_utc, home_team, away_team, updated_at
          from sports.events
          order by updated_at desc
          limit 200;
          SQL
