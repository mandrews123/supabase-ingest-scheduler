name: Ingest Sports (manual: today or future-range)

on:
  workflow_dispatch:
    inputs:
      sport:
        description: "Which sport to ingest"
        required: true
        type: choice
        options:
          - all
          - soccer
          - ufc
          - ncaa
          - boxing
          - nba
          - mlb
        default: "all"
      mode:
        description: "today = only today; future-range = today + next N-1 days"
        required: true
        type: choice
        options:
          - today
          - future-range
        default: "future-range"
      days:
        description: "Number of days when mode=future-range (1-30, includes today)"
        required: true
        default: "7"

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      # --- CHANGE THESE ONLY IF YOUR PROJECT/FUNCTION NAME CHANGES ---
      PROJECT_URL: https://dpdbdiwfanenccdvuyao.supabase.co
      FUNCTION_NAME: hyper-function

      # Optional: if your function requires JWT, add this repo secret with your anon (or service) key.
      # Repo → Settings → Secrets and variables → Actions → New repository secret:
      #   Name: SUPABASE_ANON_JWT
      SUPABASE_JWT: ${{ secrets.SUPABASE_ANON_JWT }}
    steps:
      - name: Resolve inputs
        id: cfg
        shell: bash
        run: |
          SPORT_INPUT="${{ github.event.inputs.sport }}"
          MODE="${{ github.event.inputs.mode }}"
          DAYS_RAW="${{ github.event.inputs.days }}"

          # Normalize & validate
          SPORT_INPUT="$(echo "$SPORT_INPUT" | tr '[:upper:]' '[:lower:]')"
          MODE="$(echo "$MODE" | tr '[:upper:]' '[:lower:]')"
          if [[ "$MODE" == "future-range" ]]; then
            if [[ "$DAYS_RAW" =~ ^[0-9]+$ ]]; then
              DAYS_VAL="$DAYS_RAW"
            else
              DAYS_VAL=7
            fi
            # clamp 1..30
            if (( DAYS_VAL < 1 )); then DAYS_VAL=1; fi
            if (( DAYS_VAL > 30 )); then DAYS_VAL=30; fi
          else
            DAYS_VAL=1
          fi

          # sports list
          if [[ "$SPORT_INPUT" == "all" ]]; then
            SPORTS="soccer ufc ncaa boxing nba mlb"
          else
            SPORTS="$SPORT_INPUT"
          fi

          echo "SPORTS=$SPORTS" >> $GITHUB_OUTPUT
          echo "MODE=$MODE" >> $GITHUB_OUTPUT
          echo "DAYS=$DAYS_VAL" >> $GITHUB_OUTPUT

          echo "Resolved -> SPORTS='$SPORTS' MODE='$MODE' DAYS=$DAYS_VAL"

      - name: Ingest (curl per sport)
        shell: bash
        env:
          SPORTS: ${{ steps.cfg.outputs.SPORTS }}
          DAYS: ${{ steps.cfg.outputs.DAYS }}
          MODE: ${{ steps.cfg.outputs.MODE }}
        run: |
          set -euo pipefail

          base="${PROJECT_URL}/functions/v1/${FUNCTION_NAME}"

          # Build optional auth headers if a JWT secret is present.
          H_APK=""
          H_AUTH=""
          if [[ -n "${SUPABASE_JWT:-}" ]]; then
            H_APK="-H \"apikey: ${SUPABASE_JWT}\""
            H_AUTH="-H \"Authorization: Bearer ${SUPABASE_JWT}\""
          fi

          # Helper to call curl with consistent flags.
          call_curl () {
            local sport="$1"
            local days="$2"     # number (1..30)
            local url="${base}?only=${sport}"
            # For providers that support future fixtures, the Edge Function honors ?days=N.
            # For NCAA the function ignores days (today only).
            if [[ "$days" != "1" ]]; then
              url="${url}&days=${days}"
            fi
            echo "::group::POST ${url}"
            # shellcheck disable=SC2086
            eval curl -sSf -X POST \
              "\"${url}\"" \
              -H "\"Content-Type: application/json\"" \
              ${H_APK} ${H_AUTH} \
              -d "'{}'"
            echo
            echo "::endgroup::"
          }

          # Note:
          # - Soccer/UFC/Boxing support future fixtures.
          # - NBA/MLB support future fixtures only if APISPORTS_KEY is set in Supabase Secrets.
          # - NCAA is today-only (days ignored by the function).

          for s in ${SPORTS}; do
            case "$s" in
              soccer|ufc|boxing|nba|mlb)
                call_curl "$s" "$DAYS"
                ;;
              ncaa)
                call_curl "$s" 1
                ;;
              *)
                echo "Skipping unknown sport '$s'" >&2
                ;;
            esac
          done

      - name: Hint: where to see results
        run: |
          echo "✅ Done. Verify each request under:"
          echo "  • Supabase → Edge Functions → ${FUNCTION_NAME} → Invocations (status/duration per request)"
          echo "  • Supabase → Edge Functions → ${FUNCTION_NAME} → Logs (look for [ingest] fetched_counts / upserted_total)"
          echo "  • Database → Table Editor → sports.events  (or run a SQL query like below)"
          echo
          echo "Sample SQL:"
          cat <<'SQL'
          select provider, league, sport, event_status,
                 start_time_utc, home_team, away_team, updated_at
          from sports.events
          order by updated_at desc
          limit 200;
          SQL
