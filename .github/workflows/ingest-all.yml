name: 'Ingest Sports (manual: today or future-range)'

on:
  workflow_dispatch:
    inputs:
      sport:
        description: 'Which sport to ingest'
        required: true
        default: 'all'
        type: choice
        options: [all, soccer, ufc, ncaa, boxing, nba, mlb]
      mode:
        description: 'today = only today; future-range = today + next N-1 days'
        required: true
        default: 'future-range'
        type: choice
        options: [today, future-range]
      days:
        description: 'Used only when mode=future-range (1-30, includes today)'
        required: true
        default: '7'
      date:
        description: 'Optional YYYY-MM-DD (strongly recommended for NCAA evening slates)'
        required: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      PROJECT_URL: https://dpdbdiwfanenccdvuyao.supabase.co
      FUNCTION_NAME: hyper-function
      # If your function is protected, add a repo secret SUPABASE_ANON_JWT; if public, you can omit it.
      SUPABASE_JWT: ${{ secrets.SUPABASE_ANON_JWT }}
    steps:
      - name: Resolve inputs
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          SPORT="$(echo "${{ github.event.inputs.sport }}" | tr '[:upper:]' '[:lower:]')"
          MODE="$(echo "${{ github.event.inputs.mode }}" | tr '[:upper:]' '[:lower:]')"
          DAYS_IN="${{ github.event.inputs.days }}"
          DATE_IN="${{ github.event.inputs.date }}"

          # resolve days
          if [[ "$MODE" == "future-range" ]]; then
            if [[ "$DAYS_IN" =~ ^[0-9]+$ ]]; then DAYS="$DAYS_IN"; else DAYS=7; fi
            (( DAYS<1 )) && DAYS=1
            (( DAYS>30 )) && DAYS=30
          else
            DAYS=1
          fi

          # expand all → list
          if [[ "$SPORT" == "all" ]]; then
            SPORTS="soccer ufc ncaa boxing nba mlb"
          else
            SPORTS="$SPORT"
          fi

          echo "SPORTS=$SPORTS" >> "$GITHUB_OUTPUT"
          echo "DAYS=$DAYS"     >> "$GITHUB_OUTPUT"
          echo "DATE=$DATE_IN"  >> "$GITHUB_OUTPUT"
          echo "Resolved: SPORTS='$SPORTS' DAYS=$DAYS DATE='${DATE_IN:-}'"

      - name: Ingest with curl (DEBUG)
        shell: bash
        env:
          SPORTS: ${{ steps.cfg.outputs.SPORTS }}
          DAYS:   ${{ steps.cfg.outputs.DAYS }}
          DATE:   ${{ steps.cfg.outputs.DATE }}
        run: |
          set -euo pipefail
          base="${PROJECT_URL}/functions/v1/${FUNCTION_NAME}"

          # headers
          declare -a H; H=( -H "Content-Type: application/json" )
          if [[ -n "${SUPABASE_JWT:-}" ]]; then
            H+=( -H "apikey: ${SUPABASE_JWT}" -H "Authorization: Bearer ${SUPABASE_JWT}" )
          fi

          post_debug () { # sport, days, date
            local s="$1"; local d="$2"; local dt="$3"
            local url="${base}?only=${s}"
            [[ -n "$dt" ]] && url="${url}&date=${dt}"
            [[ "$d" != "1" && "$s" != "ncaa" ]] && url="${url}&days=${d}"
            echo "::group::POST ${url}"
            # No -f here, so we can see error body even on 4xx/5xx
            curl -sS -D /tmp/headers.txt -o /tmp/body.txt -w "HTTP_CODE=%{http_code}\n" \
                 -X POST "$url" "${H[@]}" -d '{}' || true
            echo "--- Response headers ---"; cat /tmp/headers.txt || true
            echo "--- Response body ---";    cat /tmp/body.txt || true
            echo "::endgroup::"
          }

          # You can debug all sports, but since your failure is ncaa, start with just NCAA:
          post_debug "ncaa" "1" "${DATE:-}"

          # If you also want to debug others in the same run, uncomment the lines below:
          # post_debug "soccer" "${DAYS}" "${DATE:-}"
          # post_debug "ufc"    "${DAYS}" "${DATE:-}"
          # post_debug "boxing" "${DAYS}" "${DATE:-}"
          # post_debug "nba"    "${DAYS}" "${DATE:-}"
          # post_debug "mlb"    "${DAYS}" "${DATE:-}"

      - name: Where to verify
        run: |
          echo "Check Supabase:"
          echo " • Edge Functions → ${FUNCTION_NAME} → Invocations (HTTP status/duration)"
          echo " • Edge Functions → ${FUNCTION_NAME} → Logs (look for [ingest] fetched_counts / upserted_total)"
          echo " • Database → Table Editor → sports.events"
