name: Ingest UFC (Sat every 5m)

on:
  schedule:
    - cron: "*/5 * * * SAT"  # Saturdays (UTC)
  workflow_dispatch:

jobs:
  call:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase Edge Function (ufc)
        run: |
          curl -sSf -X POST \
            "https://dpdbdiwfanenccdvuyao.supabase.co/functions/v1/hyper-function?only=ufc" \
            -H "Content-Type: application/json" \
            -d '{}'
